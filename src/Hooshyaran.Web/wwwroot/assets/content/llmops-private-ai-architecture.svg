<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">معماری LLMOPS برای استقرار هوش مصنوعی خصوصی</title>
  <desc id="desc">نمای لایه‌های رابط کاربری، گیت‌وی، استنتاج مدل، دانش سازمانی، لاگ، پایش و داشبورد مدیریتی در یک استقرار داخلی</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071A2B"/>
      <stop offset=".52" stop-color="#0D3552"/>
      <stop offset="1" stop-color="#16324D"/>
    </linearGradient>
    <linearGradient id="aqua" x1="0" x2="1">
      <stop offset="0" stop-color="#08BFD3"/>
      <stop offset="1" stop-color="#2BA7E2"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#F6A23A"/>
      <stop offset="1" stop-color="#08BFD3"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label{font-family:Tahoma,Arial,sans-serif;font-weight:700;fill:#fff;font-size:30px;direction:rtl}
      .sub{font-family:Tahoma,Arial,sans-serif;fill:#D8EEF5;font-size:19px;direction:rtl}
      .small{font-family:Tahoma,Arial,sans-serif;fill:#B7D5E2;font-size:16px;direction:rtl}
      .box{fill:rgba(255,255,255,.08);stroke:rgba(125,231,242,.36);stroke-width:2}
      .box2{fill:rgba(255,255,255,.10);stroke:rgba(246,162,58,.42);stroke-width:2}
      .line{fill:none;stroke:url(#aqua);stroke-width:4;stroke-linecap:round;opacity:.72}
      .line2{fill:none;stroke:url(#orange);stroke-width:4;stroke-linecap:round;opacity:.72}
      .dot{fill:#7DE7F2;filter:url(#glow)}
      .dot2{fill:#F6A23A;filter:url(#glow)}
    </style>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <g opacity=".32">
    <path d="M0 120H1400M0 220H1400M0 320H1400M0 420H1400M0 520H1400M0 620H1400M0 720H1400" stroke="#7DE7F2" stroke-width="1"/>
    <path d="M120 0V820M260 0V820M400 0V820M540 0V820M680 0V820M820 0V820M960 0V820M1100 0V820M1240 0V820" stroke="#7DE7F2" stroke-width="1"/>
  </g>
  <circle cx="700" cy="410" r="250" fill="none" stroke="#08BFD3" stroke-width="2" opacity=".24"/>
  <circle cx="700" cy="410" r="340" fill="none" stroke="#F6A23A" stroke-width="2" opacity=".18"/>
  <path class="line" d="M1160 210C1010 250 910 315 805 380"/>
  <path class="line" d="M1160 410C1010 410 930 410 820 410"/>
  <path class="line2" d="M1160 610C1010 560 905 505 805 455"/>
  <path class="line" d="M580 270C520 320 480 360 420 390"/>
  <path class="line2" d="M580 530C520 495 470 455 420 430"/>
  <path class="line" d="M330 315C270 340 225 370 170 410"/>
  <path class="line2" d="M330 505C270 480 225 450 170 420"/>
  <g transform="translate(1130 140)">
    <rect class="box" width="230" height="150" rx="18"/>
    <text class="label" x="196" y="52" text-anchor="end">کاربران سازمان</text>
    <text class="sub" x="196" y="88" text-anchor="end">چت، داشبورد، اپلیکیشن کاری</text>
    <text class="small" x="196" y="120" text-anchor="end">دسترسی نقش‌محور</text>
  </g>
  <g transform="translate(1130 340)">
    <rect class="box" width="230" height="150" rx="18"/>
    <text class="label" x="196" y="52" text-anchor="end">گیت‌وی و سیاست‌ها</text>
    <text class="sub" x="196" y="88" text-anchor="end">مسیریابی، کنترل مصرف، audit</text>
    <text class="small" x="196" y="120" text-anchor="end">بدون خروج داده حساس</text>
  </g>
  <g transform="translate(1130 540)">
    <rect class="box2" width="230" height="150" rx="18"/>
    <text class="label" x="196" y="52" text-anchor="end">لاگ و پایش</text>
    <text class="sub" x="196" y="88" text-anchor="end">توکن، latency، کیفیت پاسخ</text>
    <text class="small" x="196" y="120" text-anchor="end">ردپای درخواست تا پاسخ</text>
  </g>
  <g transform="translate(560 305)">
    <rect width="300" height="210" rx="24" fill="rgba(8,191,211,.15)" stroke="#7DE7F2" stroke-width="3" filter="url(#glow)"/>
    <text class="label" x="150" y="72" text-anchor="middle">هسته LLMOPS</text>
    <text class="sub" x="150" y="112" text-anchor="middle">مدیریت مدل محلی و عملیات AI</text>
    <text class="small" x="150" y="150" text-anchor="middle">استقرار کانتینری روی سرور سازمان</text>
  </g>
  <g transform="translate(300 220)">
    <rect class="box" width="260" height="145" rx="18"/>
    <text class="label" x="220" y="52" text-anchor="end">استنتاج مدل</text>
    <text class="sub" x="220" y="88" text-anchor="end">پاسخ‌گویی GPU به درخواست‌ها</text>
    <text class="small" x="220" y="118" text-anchor="end">API سازگار برای اپلیکیشن‌ها</text>
  </g>
  <g transform="translate(300 455)">
    <rect class="box2" width="260" height="145" rx="18"/>
    <text class="label" x="220" y="52" text-anchor="end">دانش سازمانی</text>
    <text class="sub" x="220" y="88" text-anchor="end">اسناد، فایل‌ها و دیتابیس‌ها</text>
    <text class="small" x="220" y="118" text-anchor="end">بازیابی زمینه برای پاسخ دقیق</text>
  </g>
  <g transform="translate(40 330)">
    <rect class="box" width="230" height="150" rx="18"/>
    <text class="label" x="194" y="52" text-anchor="end">مدل محلی</text>
    <text class="sub" x="194" y="88" text-anchor="end">اجرا روی زیرساخت اختصاصی</text>
    <text class="small" x="194" y="120" text-anchor="end">قابل تعویض و توسعه</text>
  </g>
  <g transform="translate(600 665)">
    <rect class="box" width="360" height="78" rx="18"/>
    <text class="sub" x="320" y="32" text-anchor="end">داشبورد مدیریتی: سلامت سرویس، مصرف، کاربران، مدل‌ها و رخدادها</text>
    <text class="small" x="320" y="58" text-anchor="end">برای مدیران، تیم فنی و راهبران هوش مصنوعی</text>
  </g>
  <circle class="dot" cx="1045" cy="255" r="9"/>
  <circle class="dot" cx="970" cy="410" r="8"/>
  <circle class="dot2" cx="1015" cy="555" r="9"/>
  <circle class="dot" cx="505" cy="320" r="7"/>
  <circle class="dot2" cx="505" cy="500" r="7"/>
  <circle class="dot" cx="242" cy="357" r="8"/>
  <circle class="dot2" cx="242" cy="458" r="8"/>
</svg>
