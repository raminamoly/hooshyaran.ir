<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" role="img" aria-labelledby="title desc">
  <title id="title">مدل معماری سامانه پایش هوشمند کارکنان با هوش مصنوعی</title>
  <desc id="desc">دیاگرام معماری شامل کلاینت، Agent، گیت‌وی، پردازش داده، موتور تحلیل هوش مصنوعی، ذخیره‌سازی و پنل مدیریتی</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset=".52" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1d4ed8" flood-opacity=".13"/>
    </filter>
    <style>
      .rtl{font-family:Tahoma,Arial,sans-serif;direction:rtl}
      .panel{fill:#fff;stroke:#bed5f4;stroke-width:1.4;filter:url(#softShadow)}
      .mini{fill:#f7fbff;stroke:#b7cff0;stroke-width:1.2}
      .label{fill:#0f2557;font-size:18px;font-weight:700}
      .small{fill:#53647f;font-size:14px;font-weight:400}
      .line{fill:none;stroke:#7fa7e6;stroke-width:2;stroke-dasharray:8 7}
      .solid{fill:none;stroke:#2463eb;stroke-width:2.2}
      .icon{fill:none;stroke:#1d4ed8;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1180" height="610" rx="34" fill="url(#bg)"/>
  <g opacity=".55">
    <path d="M80 82h1020M80 170h1020M80 258h1020M80 346h1020M80 434h1020M80 522h1020" stroke="#dbeafe"/>
    <path d="M150 58v494M330 58v494M510 58v494M690 58v494M870 58v494M1050 58v494" stroke="#eaf2ff"/>
  </g>

  <g class="rtl">
    <rect class="panel" x="42" y="86" width="132" height="310" rx="18"/>
    <text class="label" x="108" y="126" text-anchor="middle">کلاینت‌ها</text>
    <text class="small" x="108" y="151" text-anchor="middle">دستگاه کارکنان</text>
    <g transform="translate(75 181)">
      <rect class="mini" width="66" height="48" rx="9"/>
      <path class="icon" d="M21 33h24M26 17h14M22 17h22v14H22z"/>
      <rect class="mini" y="64" width="66" height="48" rx="9"/>
      <path class="icon" d="M18 89h30M23 75h20M21 99h24"/>
      <rect class="mini" y="128" width="66" height="48" rx="9"/>
      <path class="icon" d="M21 149h24M29 137h8v24h-8z"/>
    </g>

    <rect class="panel" x="222" y="201" width="132" height="96" rx="16"/>
    <text class="label" x="288" y="242" text-anchor="middle">Agent</text>
    <text class="small" x="288" y="268" text-anchor="middle">جمع‌آوری امن داده</text>

    <rect class="panel" x="412" y="80" width="312" height="340" rx="20"/>
    <text class="label" x="568" y="121" text-anchor="middle">سرور مرکزی</text>
    <rect class="mini" x="438" y="152" width="125" height="62" rx="10"/>
    <text class="small" x="500" y="188" text-anchor="middle">API Gateway</text>
    <rect class="mini" x="585" y="152" width="112" height="62" rx="10"/>
    <text class="small" x="641" y="188" text-anchor="middle">احراز هویت</text>
    <rect class="mini" x="438" y="240" width="125" height="62" rx="10"/>
    <text class="small" x="500" y="276" text-anchor="middle">پردازش داده</text>
    <rect class="mini" x="585" y="240" width="112" height="62" rx="10"/>
    <text class="small" x="641" y="276" text-anchor="middle">نرمال‌سازی</text>
    <rect class="mini" x="486" y="332" width="164" height="62" rx="12" fill="#eef6ff"/>
    <text class="label" x="568" y="369" text-anchor="middle">موتور تحلیل AI</text>

    <rect class="panel" x="782" y="151" width="160" height="198" rx="18"/>
    <text class="label" x="862" y="193" text-anchor="middle">ذخیره‌سازی</text>
    <rect class="mini" x="808" y="222" width="108" height="48" rx="9"/>
    <text class="small" x="862" y="252" text-anchor="middle">Database</text>
    <rect class="mini" x="808" y="284" width="108" height="48" rx="9"/>
    <text class="small" x="862" y="314" text-anchor="middle">File Storage</text>

    <rect class="panel" x="1002" y="97" width="134" height="296" rx="18"/>
    <text class="label" x="1069" y="137" text-anchor="middle">مدیران</text>
    <rect class="mini" x="1026" y="178" width="86" height="70" rx="10"/>
    <text class="small" x="1069" y="207" text-anchor="middle">داشبورد</text>
    <text class="small" x="1069" y="230" text-anchor="middle">مدیریتی</text>
    <rect class="mini" x="1026" y="276" width="86" height="70" rx="10"/>
    <text class="small" x="1069" y="305" text-anchor="middle">گزارش و</text>
    <text class="small" x="1069" y="328" text-anchor="middle">هشدار</text>

    <path class="solid" d="M174 249h48"/>
    <path class="solid" d="M354 249h58"/>
    <path class="line" d="M724 249h58"/>
    <path class="line" d="M942 249h60"/>
    <path class="solid" d="M520 214v26"/>
    <path class="solid" d="M641 214v26"/>
    <path class="solid" d="M568 302v30"/>

    <g transform="translate(54 462)">
      <rect class="panel" width="1072" height="82" rx="16"/>
      <g transform="translate(52 25)">
        <path class="icon" d="M16 28h16M20 12h8v16h-8z"/>
        <text class="small" x="142" y="23" text-anchor="end">امنیت و احراز هویت</text>
      </g>
      <g transform="translate(300 25)">
        <path class="icon" d="M12 29h24M17 13h14v16H17z"/>
        <text class="small" x="154" y="23" text-anchor="end">رمزنگاری داده‌ها</text>
      </g>
      <g transform="translate(555 25)">
        <path class="icon" d="M10 29h26M14 20h18M18 11h10"/>
        <text class="small" x="188" y="23" text-anchor="end">پشتیبانی و تداوم کسب‌وکار</text>
      </g>
      <g transform="translate(855 25)">
        <path class="icon" d="M12 28l8-16 8 16M16 22h8"/>
        <text class="small" x="160" y="23" text-anchor="end">مانیتورینگ زیرساخت</text>
      </g>
    </g>
